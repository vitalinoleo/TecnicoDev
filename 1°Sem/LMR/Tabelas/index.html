<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- tag de tabelas -->

    <table border="10">
        <!-- Aqui temos uma tabela em horizontal -->
        <thead>
            <!-- esse thead serve para indicar que essa parte da tabela é o cabeçalho  -->
            <th width="200px">A</th>
            <th width="200px">B</th>
            <th width="200px">C</th>
        </thead>
        <tbody>
            <!-- tbody serve para indicar o corpo da tabela -->
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tbody>
        <tbody>
            <td>4</td>
            <td>5</td>
            <td>6</td>
        </tbody>
        <tbody>
            <td>7</td>
            <td>8</td>
            <td>9</td>
        </tbody>
    </table>

    <!-- a tabela eu posso fazer ela desse jeito a cima, como eu também posso fazer da seguinte forma  -->

    <table border="10">
        <thead>
            <th width="200px">D</th>
            <th width="200px">E</th>
            <th width="200px">F</th>
        </thead>
        <tbody>
            <td>10</td>
            <td>11</td>
            <td>12</td>
            <tr>
                <td>13</td>
                <td>14</td>
                <td>15</td>
            </tr>
            <tr>
                <td>16</td>
                <td>17</td>
                <td>18</td>
            </tr>
        </tbody>
    </table>

    <!--  a diferença entre as duas é que na primeira eu criei 3 corpos para a tabela 
      enquanto, na segunda eu apenas fui pulando para a linha de baixo -->
</body>

</html>
